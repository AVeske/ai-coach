meta:
  id: pullup
  name: Pull-up
  group: back
  filming:
    primary_view: front
    tip: "Front view with full arms and bar visible; avoid backlighting."
  signals:
    primary: wrist_y
    fallback: elbow_angle
    peak_is_top: false # top/chin-over-bar is low Y (valley)

events:
  min_peak_distance_s: 0.40
  min_rep_duration_s: 0.60
  max_rep_duration_s: 8.0
  prominence_std: 0.08
  width_s: 0.06
  winsor_lo: 0.08
  winsor_hi: 0.92
  force_signal: auto
  force_variant: auto
  refractory_ms: 280
  seed:
    window_s: 0.60
    peak_frac: 0.96
    tol_deg: 8.0
    min_drop_frac: 0.05
    min_drop_deg: 14.0
    exclude_radius_frames: 3
    skip_if_valid_span_starts_within_s: 1.0
  bookend:
    edge_start_s: 1.0
    edge_end_s: 1.0
    min_amp_deg: 0.0
    min_frac_of_median: 0.65
    pre_start_ignore_s: 0.0
    depth_guard_deg: null

quality:
  enabled: true
  rom_min_deg: 25
  ecc_min_s: 0.9
  con_max_s: 3.8
  total_max_s: 8.0
  bottom_max_s: 1.2
  top_max_s: 1.8
  vel_ecc_max: 420
  con_to_ecc_ratio_hi: 1.8
  con_heavy_s: 3.0
  pause_eps_deg_s: 8
  min_pause_s: 0.12

metrics:
  rom_deg:
    kind: rom
    min_delta: 25
    tiers:
      optimal: [70, 999]
      acceptable: [50, 70]
      suboptimal: [0, 50]
  tempo_s:
    kind: tempo
    tiers:
      optimal: [1.2, 4.0]
      acceptable: [0.8, 1.2]
      suboptimal: [0.0, 0.8]
  lockout_min_deg: 155
  bottom_max_deg: 110

trim:
  enabled: false
  min_run_s: 1.2
  pad_s: 0.35
  conf_ema_alpha: 0.25
  motion_ema_alpha: 0.35
  conf_weight: 0.6
  motion_weight: 0.4
  z_active_thresh: -0.2
  z_inactive_thresh: -0.6

debug:
  prefer_variant_if_close: auto
  prefer_primary_if_close_delta: 1
  bands: {}

debug_plots:
  enabled: true
  dir: ./plots

bad_flags: [suboptimal]
