meta:
  id: lateral_raises
  name: Lateral Raises
  group: shoulders
  filming:
    primary_view: front
    tip: "Front view, both arms visible from hips to above shoulders."
  signals:
    primary: wrist_y
    fallback: shoulder_y
    peak_is_top: false # “top” at shoulder height is low Y (valley)

events:
  min_peak_distance_s: 0.35
  min_rep_duration_s: 0.50
  max_rep_duration_s: 7.0
  prominence_std: 0.08
  width_s: 0.06
  winsor_lo: 0.08
  winsor_hi: 0.92
  force_signal: auto
  force_variant: auto
  seed:
    window_s: 0.60
    peak_frac: 0.96
    tol_deg: 8.0
    min_drop_frac: 0.05
    min_drop_deg: 14.0
    exclude_radius_frames: 3
    skip_if_valid_span_starts_within_s: 1.0
  bookend:
    edge_start_s: 1.0
    edge_end_s: 1.0
    min_amp_deg: 0.0 # not angle-based; amplitude checks handled by signal delta
    min_frac_of_median: 0.65
    pre_start_ignore_s: 0.0
    depth_guard_deg: null

quality:
  enabled: true
  rom_min_deg: 25 # acts as minimum displacement proxy when using angle fallback
  ecc_min_s: 0.7
  con_max_s: 3.0
  total_max_s: 7.0
  bottom_max_s: 1.0
  top_max_s: 1.5
  vel_ecc_max: 520
  con_to_ecc_ratio_hi: 1.8
  con_heavy_s: 2.4
  pause_eps_deg_s: 8
  min_pause_s: 0.12

metrics:
  rom_deg:
    kind: rom
    min_delta: 25
    tiers:
      optimal: [70, 999]
      acceptable: [50, 70]
      suboptimal: [0, 50]
  tempo_s:
    kind: tempo
    tiers:
      optimal: [1.0, 3.0]
      acceptable: [0.6, 1.0]
      suboptimal: [0.0, 0.6]
  lockout_min_deg: 150
  bottom_max_deg: 110

trim:
  enabled: false
  min_run_s: 1.2
  pad_s: 0.35
  conf_ema_alpha: 0.25
  motion_ema_alpha: 0.35
  conf_weight: 0.6
  motion_weight: 0.4
  z_active_thresh: -0.2
  z_inactive_thresh: -0.6

debug:
  prefer_variant_if_close: auto
  prefer_primary_if_close_delta: 1
  bands: {}

debug_plots:
  enabled: true
  dir: ./plots

bad_flags: [suboptimal]
