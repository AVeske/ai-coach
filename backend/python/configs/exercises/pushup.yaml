events:
  peak_is_top: true
  min_peak_distance_frames: 0.30s
  min_rep_duration_s: 0.40
  max_rep_duration_s: 7.0
  prominence_std: 0.18
  width_sec: 0.08

metrics:
  rom_deg: # elbow ROM (top − bottom)
    kind: rom
    tiers:
      optimal: [90, 999]
      acceptable: [70, 90]
      suboptimal: [0, 70]
  back_neutral_deg: # back angle at bottom
    kind: angle_at
    at: bottom
    series_hint: back
    tiers:
      optimal: [170, 190]
      acceptable: [160, 170]
      suboptimal: [0, 160]
  tempo_s:
    kind: tempo
    tiers:
      optimal: [0.8, 3.0]
      acceptable: [0.5, 0.8]
      suboptimal: [0.0, 0.5]

bad_flags: [suboptimal]
