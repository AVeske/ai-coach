events:
  peak_is_top: true
  # slightly more sensitive event picking
  min_peak_distance_frames: 0.28s
  min_rep_duration_s: 0.40
  max_rep_duration_s: 7.0
  prominence_std: 0.08
  width_sec: 0.05
  winsor_lo: 0.05
  winsor_hi: 0.95
  force_signal: auto
  refractory_ms: 220
  # percentile bands on shoulder-Y (y larger at bottom)
  shoulder_y_bottom_pct: 0.72
  shoulder_y_top_pct: 0.28
  seed:
    window_s: 0.6
    peak_frac: 0.96
    tol_deg: 8.0
    min_drop_frac: 0.05
    min_drop_deg: 14.0
    exclude_radius_frames: 3
    skip_if_valid_span_starts_within_s: 1.0

metrics:
  # ROM gate – loosen a bit so borderline reps aren’t dropped
  rom_deg:
    kind: rom
    min_delta: 35
    tiers:
      optimal: [90, 999]
      acceptable: [70, 90]
      suboptimal: [0, 70]

  tempo_s:
    kind: tempo
    tiers:
      optimal: [0.8, 3.0]
      acceptable: [0.5, 0.8]
      suboptimal: [0.0, 0.5]

  # Angle bounds – a tad friendlier so they become flags, not vetoes
  lockout_min_deg: 160
  bottom_max_deg: 105

  # Hip coherence – widen slightly; we’ll still flag outliers
  hip_sag_norm:
    max: 0.10
  hip_amp_ratio:
    lo: 0.50
    hi: 1.35

debug:
  force_signal: elbow
  prefer_elbow_if_close_delta: 1

debug_plots:
  enabled: true
  dir: ./plots

bad_flags: [suboptimal]

trim:
  enabled: false # set true later if you want it
  min_run_s: 1.2
  pad_s: 0.35
  conf_ema_alpha: 0.25
  motion_ema_alpha: 0.35
  conf_weight: 0.6
  motion_weight: 0.4
  z_active_thresh: -0.2
  z_inactive_thresh: -0.6
