meta:
  id: push_up
  name: Push-up
  group: chest
  filming:
    primary_view: side_45
    tip: "45° side view, chest/hips visible."
  signals:
    primary: elbow_angle
    fallback: shoulder_y
    peak_is_top: true

events:
  min_peak_distance_s: 0.28
  min_rep_duration_s: 0.40
  max_rep_duration_s: 7.0
  prominence_std: 0.08
  width_s: 0.05
  winsor_lo: 0.05
  winsor_hi: 0.95
  force_signal: auto
  force_variant: auto
  refractory_ms: 220
  seed:
    window_s: 0.6
    peak_frac: 0.96
    tol_deg: 8.0
    min_drop_frac: 0.05
    min_drop_deg: 14.0
    exclude_radius_frames: 3
    skip_if_valid_span_starts_within_s: 1.0
  bookend:
    edge_start_s: 1.0
    edge_end_s: 1.0
    min_amp_deg: 30.0
    min_frac_of_median: 0.65
    pre_start_ignore_s: 0.0
    depth_guard_deg: null

quality:
  enabled: true
  rom_min_deg: 35
  ecc_min_s: 0.8
  con_max_s: 3.0
  total_max_s: 7.0
  bottom_max_s: 1.0
  top_max_s: 1.5
  vel_ecc_max: 450
  con_to_ecc_ratio_hi: 1.6
  con_heavy_s: 2.4
  pause_eps_deg_s: 8
  min_pause_s: 0.12

metrics:
  rom_deg:
    kind: rom
    min_delta: 35
    tiers:
      optimal: [90, 999]
      acceptable: [70, 90]
      suboptimal: [0, 70]
  tempo_s:
    kind: tempo
    tiers:
      optimal: [0.8, 3.0]
      acceptable: [0.5, 0.8]
      suboptimal: [0.0, 0.5]
  lockout_min_deg: 160
  bottom_max_deg: 105

trim:
  enabled: false
  min_run_s: 1.2
  pad_s: 0.35
  conf_ema_alpha: 0.25
  motion_ema_alpha: 0.35
  conf_weight: 0.6
  motion_weight: 0.4
  z_active_thresh: -0.2
  z_inactive_thresh: -0.6

debug:
  prefer_variant_if_close: auto
  prefer_primary_if_close_delta: 1
  bands:
    shoulder_y_bottom_pct: 0.72
    shoulder_y_top_pct: 0.28
    wrist_y_bottom_pct: null
    wrist_y_top_pct: null

debug_plots:
  enabled: true
  dir: ./plots

bad_flags: [suboptimal]
